name: Sync Data

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Trigger provider sync
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production sync
        shell: bash
        env:
          SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || secrets.NEXT_PUBLIC_SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${SITE_URL:-}" ]; then
            echo "[ERROR] NEXT_PUBLIC_SITE_URL is required."
            exit 1
          fi

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "[ERROR] CRON_SECRET is required."
            exit 1
          fi

          base_url="${SITE_URL%/}"
          curl -fsS \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${base_url}/api/cron/sync"
